name: Build and Release EXE

on:
  push:
    tags:
      - 'v*'   # 只有打 tag 才触发发布

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1️⃣ 拉代码
      - name: Checkout
        uses: actions/checkout@v3

      # 2️⃣ Python 环境
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      # 3️⃣ 安装依赖
      - name: Install Python deps
        run: |
          pip install pyinstaller flask

      # 4️⃣ 创建目录（解决你刚才那个报错）
      - name: Prepare dirs
        run: |
          mkdir build
          mkdir dist

      # 5️⃣ 打包 EXE（核心）
      - name: Build EXE
        run: |
          pyinstaller --onefile backend/app.py --clean --distpath dist --workpath build

      # 6️⃣ Node 环境（Electron）
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 7️⃣ 安装前端依赖
      - name: Install Node deps
        run: npm install

      # 8️⃣ 打包桌面应用（可选）
      - name: Build Electron App
        run: npm run build
        continue-on-error: true   # 防止失败影响EXE发布

      # 9️⃣ 发布 Release
      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
